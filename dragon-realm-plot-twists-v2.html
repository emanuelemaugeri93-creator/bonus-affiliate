
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Realm Plot Twist Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
/* Reset & Base - ELDRITCH ARCHIVES THEME */
:root {
  --bg-base: #05070A;
  --bg-panel: #0E121A;
  --bg-panel-alt: #161B26;
  --emerald: #10B981;
  --emerald-dim: rgba(16, 185, 129, 0.15);
  --gold: #FBBF24;
  --gold-dim: rgba(251, 191, 36, 0.15);
  --text-main: #E2E8F0;
  --text-muted: #8A98A8;
  --border-line: #242D3D;
  --shadow-sharp: 4px 4px 0px rgba(0,0,0,0.8);
}

#drpt-app {
  all: initial; display: block; font-family: 'Inter', sans-serif;
  width: 100vw; min-height: 100vh; position: relative; left: 50%; right: 50%;
  margin-left: -50vw; margin-right: -50vw;
  background: var(--bg-base);
  background-image: 
    linear-gradient(rgba(16, 185, 129, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(16, 185, 129, 0.03) 1px, transparent 1px);
  background-size: 30px 30px;
  box-sizing: border-box; color: var(--text-main); overflow-x: hidden;
}
#drpt-app * { box-sizing: border-box; margin: 0; padding: 0; }

/* Header - Gothic Library Vibe */
#drpt-app .drpt-header {
  text-align: center; padding: 60px 20px 50px; 
  background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-base) 100%);
  border-bottom: 2px solid var(--border-line);
  position: relative;
}
#drpt-app .drpt-header::after {
  content: ''; position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 2px; background: var(--emerald);
}

#drpt-app .drpt-badge {
  display: inline-block; background: var(--emerald-dim);
  color: var(--emerald); font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 900;
  letter-spacing: 5px; padding: 6px 18px; margin-bottom: 24px;
  border: 1px solid var(--emerald); text-transform: uppercase;
}
#drpt-app .drpt-htitle {
  font-family: 'Cinzel', serif; font-size: 3.8rem; font-weight: 900;
  letter-spacing: 2px; color: var(--gold); line-height: 1.1; margin: 0; padding: 0;
  text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
}
#drpt-app .drpt-htitle span { color: var(--emerald); }
#drpt-app .drpt-hsub {
  font-size: 1.1rem; color: var(--text-muted); margin-top: 18px; font-weight: 300; letter-spacing: 1px;
}

#drpt-app .drpt-main { max-width: 1080px; margin: 0 auto; padding: 50px 20px 80px; }

/* Grid & Cards - Sharp, Matte, Tome-like */
#drpt-app .drpt-input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 35px; }
#drpt-app .drpt-card {
  background: var(--bg-panel); border: 1px solid var(--border-line);
  padding: 30px 25px; position: relative; box-shadow: var(--shadow-sharp);
  border-top: 4px solid var(--border-line); transition: border-color 0.3s;
}
#drpt-app .drpt-card:hover { border-top-color: var(--gold); }

#drpt-app .drpt-card-title {
  font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 900; letter-spacing: 2px;
  color: #fff; margin-bottom: 25px; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}

/* Form Elements */
#drpt-app .drpt-fg { margin-bottom: 22px; }
#drpt-app .drpt-fg label {
  display: block; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 10px; color: var(--text-muted);
}
#drpt-app .drpt-select {
  width: 100%; padding: 14px 15px; border: 1px solid var(--border-line); 
  font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 400;
  background: var(--bg-base); outline: none; color: var(--text-main); 
  transition: all 0.2s; cursor: pointer; appearance: none; border-radius: 0;
}
#drpt-app .drpt-select:focus, #drpt-app .drpt-select:hover { border-color: var(--emerald); background: var(--bg-panel-alt); }

#drpt-app .drpt-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
#drpt-app .drpt-tag {
  padding: 8px 14px; border: 1px solid var(--border-line);
  font-size: 0.75rem; font-weight: 700; cursor: pointer; background: var(--bg-base);
  color: var(--text-muted); user-select: none; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
}
#drpt-app .drpt-tag:hover { border-color: var(--gold); color: var(--gold); }
#drpt-app .drpt-tag.on {
  background: var(--emerald); color: #000; border-color: var(--emerald); font-weight: 900;
}

/* Generation Button - Solid & Heavy */
#drpt-app .drpt-btn-gen {
  width: 100%; padding: 22px; background: var(--emerald); color: #000;
  border: none; font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900; 
  letter-spacing: 3px; cursor: pointer; transition: all 0.2s; margin-top: 15px;
  box-shadow: 4px 4px 0px var(--gold); text-transform: uppercase;
}
#drpt-app .drpt-btn-gen:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--gold); background: #12d393; }
#drpt-app .drpt-btn-gen:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--gold); }

/* Results Section */
#drpt-app .drpt-results { display: none; margin-top: 60px; }
#drpt-app .drpt-results.show { display: block; animation: drptFadeIn 0.8s ease forwards; }
@keyframes drptFadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

#drpt-app .drpt-divider {
  height: 2px; background: var(--border-line); margin: 40px 0; position: relative;
}
#drpt-app .drpt-divider::after {
  content: '⬥'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--bg-base); padding: 0 15px; color: var(--gold); font-size: 1.5rem;
}

#drpt-app .drpt-results-title {
  font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 900; letter-spacing: 2px;
  color: #fff; margin-bottom: 40px; text-align: center; text-transform: uppercase;
}
#drpt-app .drpt-results-title span { color: var(--emerald); }

/* Twists Layout - Book pages look */
#drpt-app .drpt-twists-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; }
#drpt-app .drpt-twist {
  background: var(--bg-panel); border: 1px solid var(--border-line); padding: 30px;
  position: relative; box-shadow: 6px 6px 0px rgba(0,0,0,0.5);
  border-left: 4px solid var(--emerald); transition: transform 0.3s;
}
#drpt-app .drpt-twist:hover { transform: translateY(-5px); border-left-color: var(--gold); }

#drpt-app .drpt-twist-num {
  font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 900; 
  color: var(--border-line); position: absolute; top: 15px; right: 20px; line-height: 1; pointer-events: none;
}
#drpt-app .drpt-twist-type {
  display: inline-block; background: var(--gold-dim); color: var(--gold);
  font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;
  padding: 6px 12px; margin-bottom: 18px; border: 1px solid rgba(251, 191, 36, 0.3);
}
#drpt-app .drpt-twist-title {
  font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 15px; line-height: 1.3;
}
#drpt-app .drpt-twist-body { font-size: 0.95rem; color: #cbd5e1; line-height: 1.7; font-weight: 300; }

#drpt-app .drpt-clue-box {
  background: var(--bg-base); border: 1px solid var(--border-line);
  padding: 16px; margin-top: 20px;
}
#drpt-app .drpt-clue-label {
  font-size: 0.7rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--emerald); margin-bottom: 8px;
}
#drpt-app .drpt-clue-text { font-size: 0.9rem; color: var(--text-muted); font-style: italic; line-height: 1.5; }

#drpt-app .drpt-twist-hook {
  margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--border-line);
  font-size: 0.9rem; color: var(--gold); font-weight: 700;
}

/* Action Buttons */
#drpt-app .drpt-actions { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 50px; }
#drpt-app .drpt-btn-regen, #drpt-app .drpt-btn-copy {
  padding: 16px 35px; font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 900; 
  letter-spacing: 3px; cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
#drpt-app .drpt-btn-regen { background: transparent; border: 2px solid var(--border-line); color: var(--text-main); }
#drpt-app .drpt-btn-regen:hover { border-color: var(--text-main); background: var(--bg-panel); }
#drpt-app .drpt-btn-copy { background: var(--gold); color: #000; border: none; box-shadow: 3px 3px 0px rgba(0,0,0,0.5); }
#drpt-app .drpt-btn-copy:hover { background: #ffcc4d; transform: translate(1px, 1px); box-shadow: 2px 2px 0px rgba(0,0,0,0.5); }

#drpt-app .drpt-loading { text-align: center; padding: 60px 20px; }
#drpt-app .drpt-loading-txt {
  font-family: 'Cinzel', serif; font-size: 2rem; color: var(--emerald);
  animation: drptPulse 1s infinite alternate; letter-spacing: 2px;
}
@keyframes drptPulse { from { opacity: 0.4; } to { opacity: 1; } }

@media(max-width: 900px) {
  #drpt-app .drpt-input-grid { grid-template-columns: 1fr; }
  #drpt-app .drpt-twists-grid { grid-template-columns: 1fr; }
  #drpt-app .drpt-htitle { font-size: 2.8rem; }
}
</style>
</head>
<body>

<div id="drpt-app">

  <div class="drpt-header">
    <div class="drpt-badge">📜 THE FORBIDDEN ARCHIVES</div>
    <div class="drpt-htitle">Arcane Mystery<br><span>Plot Twist</span> Oracle</div>
    <div class="drpt-hsub">Consult the tomes &rarr; Unveil 3 shocking truths for your dark fantasy lore</div>
  </div>

  <div class="drpt-main">

    <div class="drpt-input-grid">

      <!-- SETTING -->
      <div class="drpt-card">
        <div class="drpt-card-title">🌑 Realm Setting</div>
        <div class="drpt-fg">
          <label>Location</label>
          <select id="drpt-location" class="drpt-select">
            <option value="citadel">🏰 The Abyssal Citadel</option>
            <option value="academy">📜 The Arcane Academy</option>
            <option value="keep">⚔️ Isolated Mountain Keep</option>
            <option value="wasteland">🏜️ The Ashen Wastes</option>
            <option value="sanctuary">⛪ Forgotten Sanctuary</option>
            <option value="astral_ship">⛵ Void-skimming Skyship</option>
            <option value="village">🏚️ Cursed Fishing Village</option>
            <option value="catacombs">🪦 The Undercity Catacombs</option>
            <option value="dreamscape">🌌 The Illusionary Dreamscape</option>
          </select>
        </div>
        <div class="drpt-fg">
          <label>Era / State of World</label>
          <select id="drpt-era" class="drpt-select">
            <option value="peace">🕊️ The Fragile Peace</option>
            <option value="war">🔥 The Age of Dragons (War)</option>
            <option value="sundering">⚡ Immediately After the Sundering</option>
            <option value="plague">💀 The Crimson Blight Era</option>
            <option value="void">👁️ The Void Incursion</option>
          </select>
        </div>
      </div>

      <!-- CRIME / EVENT -->
      <div class="drpt-card">
        <div class="drpt-card-title">🩸 The Incident</div>
        <div class="drpt-fg">
          <label>Type of Dark Event</label>
          <select id="drpt-crime" class="drpt-select">
            <option value="assassination">🗡️ Assassination of a Magister</option>
            <option value="relic_theft">👑 Theft of a Primordial Relic</option>
            <option value="vanishing">🌫️ Disappearance of an Archdragon</option>
            <option value="curse_extortion">📜 Demonic Blackmail / Curse</option>
            <option value="doppelganger">🎭 Shapeshifter Impersonation</option>
            <option value="soul_blight">🧪 Soul-Blighting (Poisoning)</option>
            <option value="void_cult">👁️ Secret Void Cult Conspiracy</option>
            <option value="leyline_sabotage">💥 Leyline Sabotage</option>
          </select>
        </div>
        <div class="drpt-fg">
          <label>Entities Involved</label>
          <select id="drpt-suspects" class="drpt-select">
            <option value="2">2 prime suspects</option>
            <option value="3" selected>3 prime suspects</option>
            <option value="4">4 prime suspects</option>
            <option value="coven">An entire coven / guild</option>
          </select>
        </div>
      </div>

      <!-- DETECTIVE / INVESTIGATOR -->
      <div class="drpt-card">
        <div class="drpt-card-title">👁️ The Seeker</div>
        <div class="drpt-fg">
          <label>Investigator Archetype</label>
          <select id="drpt-detective" class="drpt-select">
            <option value="inquisitor">⚖️ Inquisitor of the Dawn</option>
            <option value="tracker">🐺 Void-touched Tracker (Ranger)</option>
            <option value="scholar">📚 Rogue Arcane Scholar</option>
            <option value="squire">🛡️ Naive Paladin Squire</option>
            <option value="outcast">🗡️ Exiled Assassin</option>
            <option value="oracle">🔮 Blind Oracle / Seer</option>
          </select>
        </div>
        <div class="drpt-fg">
          <label>Narrative Tone</label>
          <div class="drpt-tags" id="drpt-tone-tags">
            <div class="drpt-tag on" onclick="drptSelTag(this,'drpt-tone-tags')">Grimdark Noir</div>
            <div class="drpt-tag" onclick="drptSelTag(this,'drpt-tone-tags')">Psychological</div>
            <div class="drpt-tag" onclick="drptSelTag(this,'drpt-tone-tags')">Cosmic Horror</div>
            <div class="drpt-tag" onclick="drptSelTag(this,'drpt-tone-tags')">High Magic Intrigue</div>
            <div class="drpt-tag" onclick="drptSelTag(this,'drpt-tone-tags')">Brutal Action</div>
          </div>
        </div>
      </div>

    </div>

    <button class="drpt-btn-gen" onclick="drptGenerate()">Consult the Archives</button>

    <div class="drpt-results" id="drpt-results">
      <div class="drpt-divider"></div>
      <div class="drpt-results-title">The truth is darker <span>than the illusion</span></div>
      <div id="drpt-twists-container"></div>
      <div class="drpt-actions">
        <button class="drpt-btn-regen" onclick="drptGenerate()">Seek Another Truth</button>
        <button class="drpt-btn-copy" onclick="drptCopyAll()">Extract Lore Codex</button>
      </div>
    </div>

  </div>
</div>

<script>
// LORE DATABASES FOR DARK FANTASY
var drptTwistTemplates = [
  {type:"The Bound Ally Was the Corruptor",title:["The Familiar Did It","The Trusted Mentor","The One Who Guided You"],body:["The seeker's closest ally — the one who translated the runes and led them to every clue — was deliberately steering the investigation away from the truth. Every helpful spell was a misdirection.","The informant who provided the crucial break in the case was the one who cast the curse. They stayed close to control what was scried.","The paladin who vouched for the seeker has been feeding information to the void cult since the beginning."],hook:["The final residual magic matches the exact aura of the ally.","The killer's one mistake was correcting a historical detail no innocent mortal would know.","The ally dissolves into shadow the moment the seeker gets too close."]},
  {type:"The Victim Faked Their Demise",title:["The Dead Speak Lies","The Sacrifice Walked Away","They Desired the Void"],body:["The victim staged their own ritualistic death to escape something far worse than an assassin. The bloody scene was constructed with terrifying precision using a homunculus.","The noble everyone is mourning is watching the inquisition from a safe distance. The real question is: what ancient pact were they running from?","The corpse was real — but it was not the victim who died. A thrall took their place, and the true victim has no intention of correcting anyone."],hook:["The corpse's magical signature was registered three days before the death.","The victim's soul-gems were emptied the week before, not after.","Someone received a telepathic message from the victim — after the pyre was lit."]},
  {type:"The Seeker Is Compromised",title:["The Inquisitor Has a Secret","The Seeker Cast the Spell","The Summoning Was For You"],body:["The seeker was chosen for this case precisely because of a past blood-debt to the event. Someone wanted them specifically — to find the answer, or to be buried by it.","The seeker has a memory gap surrounding the exact time of the incident, wiped by mind-magic. They have been hunting themselves without knowing it.","The seeker was the intended sacrifice. The event was designed purely to draw them to this exact location."],hook:["A painting in the victim's manor includes the seeker, but from three centuries ago.","The seeker's journal contains a rune they never learned to draw — yet it matches the crime scene.","The cult's prophecy perfectly describes the seeker's psychological flaws."]},
  {type:"The Obvious Magic Was a Distraction",title:["The Blood Was Just Paint","Two Rituals, One Room","Something Else Was Summoned"],body:["The assassination was real — but it was committed merely to generate enough death-energy to mask a far more catastrophic summoning in the catacombs below.","The inquisition has been focused on the wrong target. The real objective was to quietly steal a seemingly worthless trinket while the magical authorities were distracted.","The magical blast was a reconstruction. The actual corruption happened forty-eight hours earlier, in the victim's dreams."],hook:["The ashes show the elemental fire was altered post-mortem with surgical precision.","The missing artifact was replaced with a perfect illusion — the theft went unnoticed for days.","A second caster's aura was found in a ward that should have been sealed."]},
  {type:"The Magical Alibi Shatters",title:["The Alibi Was an Illusion","No One Was Where They Scried","The Witnesses Share One Mind"],body:["The airtight alibi that cleared the prime suspect was staged by four mages who synchronized their illusions through a hive-mind link the seeker hasn't severed yet.","Scrying orbs confirm the suspect was elsewhere — but the vision was recorded a week earlier and looped on the night of the ritual.","Three witnesses recount the same exact sequence of events, breath for breath. Their memories were written by the same enchanter."],hook:["The astral timestamp on the scrying crystal does not match the stars.","The alibi witnesses all share a microscopic void-mark on their necks.","The suspect's alibi involves a temple that burned down that very night."]},
  {type:"The Shapeshifter Revealed",title:["There Were Always Two","The Face Was Stolen","The Entity Does Not Exist"],body:["The suspect has been living as two separate lords in the same citadel for years using flesh-crafting, using this event to permanently eliminate one identity and rule as the other.","The victim is not who their heraldry claims. The real noble died four years ago in the wastes. A shapeshifter has been living their life since.","The assassin does not exist. Every trace leads back to a fabricated golem created eight years ago for exactly this purpose."],hook:["Leyline traces show the suspect in two distinct realms at the exact same moment.","The victim's blood does not react to their family's ancestral blade.","A beggar describes the suspect's true face — and it matches a king confirmed dead for an age."]},
  {type:"The Arcane Trace Was Fabricated",title:["The Runes Were Too Perfect","Someone Built the Scene","The Cult Framed the Guild"],body:["Every magical trace points at the suspect with unnatural precision. The ritual was not performed organically — it was constructed by someone who understood inquisition protocols perfectly.","The real dark mage planted cursed evidence against an innocent — and planted secondary evidence to make it look like a frame-up. There are two layers of deception.","The seeker realizes the ritual matches a famous forbidden text from the archives — almost exactly. Someone used it as a blueprint."],hook:["The dark magic has no chaotic fallout — it was placed carefully, not unleashed.","The blood-runes are real, but drawn by someone who is left-handed, unlike the suspect.","A detail from a sealed, highest-clearance case file appears at the scene."]},
  {type:"The Bloodshed Was a Ritual",title:["The Murder Was a Message","Everything Was a Catalyst","The Seeker Is the Audience"],body:["The event was not committed for practical reasons. Every drop of blood, every shattered crystal is a message written in violence, addressed to someone specific — and the seeker just realized it is addressed to them.","The victim, the location, the spell used, the lunar phase. Each element is a coordinate in a cosmic lock. The killer is turning the key.","The crime is the final act of a performance that began before the seeker was born. The entity has been waiting for someone smart enough to follow the breadcrumbs here."],hook:["The victim's scars, the location's coordinates, and the time of death form a summoning circle.","A similar unsolved mystery from a forgotten age has the exact same symbolic pattern.","The entity left one artifact that only the seeker's suppressed childhood memories could recognize."]},
  {type:"The Entire Coven Was Complicit",title:["All of Them Cast the Spell","No One Is Innocent Here","The Whole Court Knew"],body:["Every suspect in the room had a reason, an opportunity, and contributed a sliver of magic to the event. There is no single culprit — there is a shared sin and a pact of silence.","The victim was destroyed by a chain of small, selfish spells cast by multiple people, none of whom believed their magic alone would be fatal.","The witnesses, the suspects, and the guards are all thralls of the same master. The seeker is the only person in the citadel with free will."],hook:["Telepathic logs show every person in the room linked minds in the hour before the event.","Each suspect's lie physically shields a different person in the room from scrying.","The victim left a prophecy. Every name in it is currently standing in this room."]},
  {type:"The Mind-Ward Was Broken",title:["What They Remember Is False","The Oracle Saw a Lie","Memory Is Not Truth"],body:["A key witness's mind has been chemically and magically altered. They are not lying — they genuinely believe they saw demons. But the vision was implanted.","The seeker realizes their own memory of entering the room contains a physical impossibility. Someone tampered with their mind the moment they crossed the threshold.","A preserved scrying-pool contradicts three sworn testimonies simultaneously. At least one person in this case has been sleeper-conditioned."],hook:["A rare lotus extract capable of inducing false memories was found in the incense burner.","The seeker's handwritten notes from the first hour do not match what they currently remember.","Three witnesses describe the entity using the exact same, hyper-specific dead language word."]}
];

var drLocationDesc = {
  citadel: ["the rain-slicked obsidian spires of the capital", "a high-magic district where the elite hide behind golden wards", "a sprawling, multi-tiered fortress where shadows stretch endlessly"],
  academy: ["an elite magical college where knowledge is bought with blood", "a floating library holding forbidden texts that drive readers mad", "a competitive academy hiding a subterranean dungeon"],
  keep: ["a snow-buried fortress cut off from the rest of the realm", "a crumbling bastion whose lord just rewrote their will in blood", "an ancient watchtower with a history of driving its garrisons insane"],
  wasteland: ["a desert of white ash where reality frequently tears open", "the petrified ruins of a civilization destroyed by dragonfire", "a sprawling dead-zone where magic behaves unpredictably"],
  sanctuary: ["a forgotten temple where the gods no longer answer", "a monastic retreat hiding a terrible celestial secret", "a holy site where three priests died under identical circumstances"],
  astral_ship: ["a massive flying galleon sealed tight for a three-day voyage", "a luxury skyship where the passenger manifest is falsified", "a smuggling vessel carrying cargo that whispers in the dark"],
  village: ["a foggy hamlet at the edge of the cursed woods", "a remote settlement that sacrifices outsiders to the lake", "a grim community where no one ages past forty"],
  catacombs: ["a labyrinth of tombs beneath the city streets", "a black-market bazaar operating in the ruins of the old world", "a sunken necropolis whose seals have just been broken"],
  dreamscape: ["a collective hallucination where death in the dream kills the body", "a digital-like mental construct built by a mad archmage", "a fractured mindscape where memories and nightmares blend together"]
};

var drEventDesc = {
  assassination: ["a high-ranking magister was found turned to crystal with no signs of a struggle", "a body was found — but its soul was extracted with surgical precision", "a warlord was murdered inside a perfectly sealed, anti-magic vault"],
  relic_theft: ["a primordial artifact that keeps the city afloat vanished from its pedestal", "a cursed sword was stolen — but the owner claims they wanted it gone", "an ancient crown was taken, and a counterfeit made of human bone left in its place"],
  vanishing: ["an ancient dragon patron vanished mid-flight, leaving no trace in the sky", "three legendary heroes with nothing in common all disappeared simultaneously", "a king vanished, but his magical signature still issues orders from the empty throne"],
  curse_extortion: ["an anonymous rune threatens to unleash a plague unless demands are met", "a noble has been paying blood-tribute to a demon for years — and just stopped", "the extorting warlock was found dead before the pact's deadline"],
  doppelganger: ["the victim had been unknowingly living alongside their own perfect clone", "the seeker realizes the person they are protecting lacks a shadow", "two beings claim to be the same archmage — and both possess their ultimate magic"],
  soul_blight: ["a slow-acting spiritual rot with no known cure was introduced into the water", "the curse was bound to an object only the victim's bloodline could touch", "the alchemical report shows a poison forged from a god's tear"],
  void_cult: ["a heresy reaches higher into the royal court than anyone dared to imagine", "the cult has been operating directly beneath the inquisition's nose for decades", "the conspiracy was deliberately exposed — as a distraction for a larger strike"],
  leyline_sabotage: ["the magical grid protecting the city was severed from the inside", "the catastrophic explosion was meant to look like an elemental accident", "a massive ritual circle was subtly altered to summon instead of banish"]
};

var drInvestigatorDesc = {
  inquisitor: ["bound by rigid dogma that prevents them from seeing the gray areas", "whose own order might be involved in the heresy they are investigating", "who wields holy fire but relies on fear to get answers"],
  tracker: ["who relies on heightened bestial instincts over civilized logic", "who stumbles into the truth because they survive what would kill a scholar", "who has been hunted by the same entity they are now tracking"],
  scholar: ["whose mind processes magical matrices others cannot even perceive", "who knows the theoretical answer already but lacks the physical proof", "whose obsession with forbidden knowledge borders on madness"],
  squire: ["who accidentally witnesses a ritual they were never meant to see", "who everyone underestimates, including the ancient evil", "who must choose between their naive ideals and a grim reality"],
  outcast: ["operating outside the king's law because the law is corrupt", "who the local guards suspect just as much as the actual culprit", "whose bloody past connects to this event in ways they are afraid to admit"],
  oracle: ["who sees fragmented visions of the crime but cannot trust their own mind", "whose prophecies are dismissed by the elite — until the sky burns", "who knows exactly who did it, but the physical evidence proves otherwise"]
};

var drClues = {
  citadel: ["A teleportation circle used twice simultaneously in different districts", "A magical ward with a 4-minute gap in its defensive logs", "A high-society ledger timestamped before the event occurred"],
  academy: ["A student's spellbook used to access a restricted archive after they were expelled", "A master-level rune drawn by someone who failed basic casting", "A spatial-pocket locker that was emptied hours before the crime was discovered"],
  keep: ["A blood-pact amendment dated the morning of the lord's death", "A sealed guest chamber that shows signs of being occupied by an invisible entity", "A secret passage behind the armory that radiates fresh void-energy"],
  wasteland: ["A trail of footprints that turn from human boots to monstrous claws, then vanish", "A scrying record for a location that doesn't exist on any map", "A supply caravan found completely untouched, but lacking any bodies"],
  sanctuary: ["A celestial chart altered retroactively to hide a specific astrological alignment", "A healing potion administered to someone who wasn't wounded", "An acolyte's talisman used to open the catacombs during the witching hour"],
  astral_ship: ["A first-class ticket purchased with ancient, extinct currency", "A passenger listed on the manifest whose soul cannot be sensed", "A dimensional luggage tag from a realm the ship never traversed"],
  village: ["A gravestone showing a death date from tomorrow", "A local map that depicts a towering monolith where there is only an empty field", "A villager who refuses to bleed when cut"],
  catacombs: ["An encrypted bone-scroll revealing a meeting that predates the tomb's opening", "A guild token found in the victim's hand — for a guild eradicated centuries ago", "A ritual offering made to a god whose name has been erased from history"],
  dreamscape: ["A mind-construct that continued functioning after the dreamer died", "A psychic intrusion from a mind that has been lobotomized", "A magical signature that is perfectly valid but attributed to a fictional hero"]
};

function drptRnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function drptShuffle(arr) { 
  let a = arr.slice(); 
  for (let i = a.length - 1; i > 0; i--) { 
    let j = Math.floor(Math.random() * (i + 1)); 
    [a[i], a[j]] = [a[j], a[i]]; 
  } 
  return a; 
}

function drptSelTag(el, grp) {
  document.querySelectorAll('#' + grp + ' .drpt-tag').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
}

function drptGenerate() {
  let results = document.getElementById('drpt-results');
  let container = document.getElementById('drpt-twists-container');
  results.classList.add('show');

  container.innerHTML = '<div class="drpt-loading"><div class="drpt-loading-txt">Consulting the Tomes...</div></div>';
  results.scrollIntoView({behavior: 'smooth', block: 'start'});

  setTimeout(() => {
    let loc = document.getElementById('drpt-location').value;
    let crime = document.getElementById('drpt-crime').value;
    let detective = document.getElementById('drpt-detective').value;
    let suspects = document.getElementById('drpt-suspects').value;

    let locDesc = drptRnd(drLocationDesc[loc] || drLocationDesc['citadel']);
    let crimeDesc = drptRnd(drEventDesc[crime] || drEventDesc['assassination']);
    let detDesc = drptRnd(drInvestigatorDesc[detective] || drInvestigatorDesc['scholar']);
    let clueList = drClues[loc] || drClues['citadel'];

    let shuffledTemplates = drptShuffle(drptTwistTemplates).slice(0, 3);
    let shuffledClues = drptShuffle(clueList);

    let html = '<div class="drpt-twists-grid">';
    let twistsData = [];

    for(let i = 0; i < 3; i++) {
      let tw = shuffledTemplates[i];
      let clue = shuffledClues[i % shuffledClues.length] || 'A crucial piece of magical evidence contradicts the official timeline.';
      let title = drptRnd(tw.title);
      let body = drptRnd(tw.body);
      let hook = drptRnd(tw.hook);

      html += `<div class="drpt-twist">
        <div class="drpt-twist-num">0${i+1}</div>
        <div class="drpt-twist-type">${tw.type}</div>
        <div class="drpt-twist-title">${title}</div>
        <div class="drpt-twist-body">${body}</div>
        <div class="drpt-clue-box">
          <div class="drpt-clue-label">👁️ Arcane Clue</div>
          <div class="drpt-clue-text">${clue}</div>
        </div>
        <div class="drpt-twist-hook">${hook}</div>
      </div>`;

      twistsData.push({ type: tw.type, title: title, body: body, clue: clue, hook: hook });
    }
    html += '</div>';
    container.innerHTML = html;

    window._drptLast = {
      loc: locDesc, crime: crimeDesc, detective: detDesc, suspects: suspects, twists: twistsData
    };
  }, 800);
}

function drptCopyAll() {
  let d = window._drptLast;
  if(!d) { alert('Consult the Oracle first!'); return; }

  let activeTone = document.querySelector('#drpt-tone-tags .drpt-tag.on').innerText;

  let txt = `DRAGON REALM MYSTERY LORE PROMPT
==================================
`;
  txt += `Theme / Tone: ${activeTone}
`;
  txt += `Setting: ${d.loc}
`;
  txt += `The Incident: ${d.crime}
`;
  txt += `The Seeker: ${d.detective}
`;
  txt += `Entities Involved: ${d.suspects}

`;

  d.twists.forEach((tw, i) => {
    txt += `--- TWIST 0${i+1}: ${tw.type} ---
`;
    txt += `Concept: ${tw.title}
`;
    txt += `Lore: ${tw.body}
`;
    txt += `Hidden Clue: ${tw.clue}
`;
    txt += `The Hook: ${tw.hook}

`;
  });

  txt += `Instructions for AI: Use these twists to build a gripping narrative outline for a dark fantasy detective story in the Dragon Realm universe.`;

  if(navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => alert('Lore Codex copied to clipboard!'));
  } else {
    let ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    alert('Lore Codex copied to clipboard!');
  }
}
</script>
