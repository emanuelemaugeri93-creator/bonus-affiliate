<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🌀 Spin & Learn Wheel Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--stroke:#1e272e;--sb:#0d1117;--fd:'Fredoka One',cursive;--fb:'Nunito',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--fb);background:#0d1117;background-image:radial-gradient(#1c2333 2px,transparent 2px);background-size:28px 28px;display:flex}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
#sb{width:300px;min-width:300px;background:#161b22;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;border-right:1px solid #30363d;scrollbar-width:none}
#sb::-webkit-scrollbar{display:none}
.logo{display:flex;align-items:center;gap:10px}.logo-t{font-family:var(--fd);font-size:20px;color:#fff;line-height:1.1}.logo-t span{color:#58a6ff}
.app-desc{font-size:10px;font-weight:900;background:#0d1117;color:#58a6ff;padding:4px 8px;border-radius:6px;text-align:center;border:1px solid #30363d}
.cg{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:8px}.lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;display:block;margin-bottom:2px}
select,input[type=text],input[type=number]{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#fff;font-family:var(--fb);font-size:12px;font-weight:700;outline:none;appearance:none}
select:focus,input:focus{border-color:#58a6ff}.ng{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.nb{padding:7px 5px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:10px;font-weight:800;cursor:pointer;text-align:center;line-height:1.3}.nb:hover{border-color:#58a6ff;color:#fff}.nb.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
button{width:100%;padding:10px;border-radius:8px;border:none;font-family:var(--fb);font-size:12px;font-weight:900;cursor:pointer;transition:all .2s;margin-bottom:5px}button:last-child{margin-bottom:0}button:active{transform:scale(.97)}
.btn-gen{background:#238636;color:#fff;font-size:15px;padding:13px;box-shadow:0 4px 14px rgba(35,134,54,.3)}.btn-gen:hover{background:#2ea043}
.btn-sec{background:#0d1117;color:#cdd9e5;border:1px solid #30363d}.btn-sec:hover{background:#161b22}
.nav-row{display:flex;align-items:center;gap:6px}.nav-btn{flex:1;padding:8px;border-radius:8px;background:#0d1117;border:1px solid #30363d;color:#fff;font-size:11px;font-weight:900;cursor:pointer}.nav-num{font-family:var(--fd);font-size:16px;color:#58a6ff;min-width:50px;text-align:center}
.info{font-size:11px;color:#8b949e;line-height:1.6}.info b{color:#58a6ff}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:24px 20px 60px;scrollbar-width:none}#main::-webkit-scrollbar{display:none}#sheetWrap{display:flex;justify-content:center;width:100%}
.sheet{width:794px;background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:visible;transform-origin:top center;display:flex;flex-direction:column}
.ws-hdr{padding:16px 28px 12px;border-bottom:4px solid var(--stroke);display:flex;justify-content:space-between;align-items:flex-start}.ws-hdr-left h1{font-family:var(--fd);font-size:28px;color:var(--stroke);line-height:1}.ws-hdr-left p{font-size:12px;font-weight:800;color:#666;margin-top:4px}
.ws-fields{display:flex;flex-direction:column;gap:6px}.ws-field{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:900;color:var(--stroke);white-space:nowrap}.field-line{flex:1;min-width:100px;height:2px;background:repeating-linear-gradient(90deg,var(--stroke) 0,var(--stroke) 5px,transparent 5px,transparent 10px)}
.instr-banner{margin:10px 24px 0;background:#f8f9fa;border:2.5px solid var(--stroke);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:800;color:var(--stroke);display:flex;align-items:center;gap:10px}
.wheel-zone{padding:18px 24px 10px;display:flex;flex-direction:column;align-items:center}.wheel-top-note{font-size:11px;font-weight:900;color:#666;margin-bottom:8px;text-align:center}
.real-spinner-wrap{position:relative;width:430px;height:430px;display:flex;align-items:center;justify-content:center}
.pointer-top{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:5;width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;border-top:0;border-bottom:32px solid #e63946;filter:drop-shadow(0 2px 0 #1e272e)}
.spinner-stage{width:390px;height:390px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
#wheelSvgWrap{width:360px;height:360px;transition:transform 4.2s cubic-bezier(.17,.67,.12,1);transform:rotate(0deg);transform-origin:center center;will-change:transform}
.spin-btn{margin-top:10px;width:auto;padding:10px 18px;background:#1f6feb;color:#fff;border-radius:999px;font-size:13px;box-shadow:0 4px 12px rgba(31,111,235,.25)}.spin-btn:hover{background:#388bfd}
.result-banner{margin-top:10px;min-height:42px;padding:10px 16px;border:2px dashed #ccc;border-radius:10px;font-size:13px;font-weight:900;color:#555;background:#fafafa;display:flex;align-items:center;justify-content:center;text-align:center;max-width:520px}
.result-banner b{color:#111}
.cards-zone{padding:6px 24px 18px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.task-card{border:3px solid var(--stroke);border-radius:12px;padding:12px;background:#fff;box-shadow:2px 2px 0 var(--stroke);display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:all 0.3s;position:relative}
.task-card:hover{transform:translateY(-2px);box-shadow:4px 4px 0 var(--stroke)}
.task-card.completed{opacity:0.75;border-style:dashed}
.task-card.completed::after{content:'✅';position:absolute;top:8px;right:8px;font-size:20px;z-index:2}
.task-head{display:flex;align-items:center;gap:10px}.task-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:18px;color:#fff;border:2px solid var(--stroke)}
.task-title{font-family:var(--fd);font-size:15px;color:var(--stroke)}.task-sub{font-size:11px;font-weight:800;color:#666;margin-top:2px}
.task-body{display:flex;gap:10px;align-items:flex-start}.mini-icon{font-size:28px;line-height:1;min-width:34px;text-align:center}
.task-area{flex:1;border:2px dashed #cfcfcf;border-radius:8px;padding:8px;min-height:84px;background:#fafafa}
.big-color-target{font-size:40px;text-align:center;line-height:1.1}
.trace-lines{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}.trace-char{font-size:28px}
.trace-write{margin-top:8px;border-top:2px dashed #d0d0d0;padding-top:8px;font-size:11px;font-weight:900;color:#888;text-align:center}
.count-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}.count-item{font-size:28px;line-height:1}.count-answer{margin-top:8px;text-align:center;font-size:12px;font-weight:900;color:#666}
.find-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.find-box{border:2px solid #ddd;border-radius:8px;padding:6px;text-align:center;font-size:28px;background:#fff;line-height:1.1;cursor:pointer;transition:all 0.2s}.find-box:hover{background:#f0f0f0}.find-box.circled{border-color:#e63946;background:#ffe5e5;box-shadow:0 0 0 3px rgba(230,57,70,0.3)}.find-answer{margin-top:6px;text-align:center;font-size:11px;font-weight:900;color:#888}
.match-row{display:flex;justify-content:space-between;gap:12px}.match-col{display:flex;flex-direction:column;gap:8px;flex:1}.match-item{border:2px solid #ddd;border-radius:8px;padding:6px;text-align:center;font-size:24px;background:#fff;line-height:1;cursor:pointer;transition:all 0.2s}.match-item:hover{background:#f0f0f0}.match-item.selected{border-color:#58a6ff;background:#e6f0ff}.match-center{width:60px;display:flex;flex-direction:column;justify-content:space-around}.match-line{border-top:2px dashed #d8d8d8}
.draw-area{height:66px;border:2px dashed #d0d0d0;border-radius:8px;background:repeating-linear-gradient(0deg,transparent,transparent 21px,#eee 21px,#eee 22px),repeating-linear-gradient(90deg,transparent,transparent 21px,#eee 21px,#eee 22px)}
.draw-canvas{width:100%;height:66px;border:2px dashed #d0d0d0;border-radius:8px;cursor:crosshair;background:#fff;touch-action:none}
.name-row{font-size:32px;text-align:center;line-height:1}.name-write{margin-top:8px;border-top:2px dashed #d0d0d0;padding-top:8px;font-size:12px;font-weight:900;color:#777;text-align:center}
.copy-wrap{display:flex;justify-content:space-between;gap:8px}.copy-box{flex:1;border:2px solid #ddd;border-radius:8px;min-height:56px;display:flex;align-items:center;justify-content:center;font-size:26px;background:#fff}.copy-arrow{display:flex;align-items:center;font-size:22px;color:#999}
.task-input{background:transparent;font-family:var(--fb);outline:none;transition:border-color 0.3s;border:none;border-bottom:2px dashed #ccc;font-size:14px;font-weight:bold;text-align:center}
.task-input:focus{border-bottom-color:#58a6ff!important}
.footer-bonus{margin:0 24px 16px;display:flex;gap:10px}.bonus-box{flex:1;border:3px solid var(--stroke);border-radius:12px;padding:12px;box-shadow:2px 2px 0 var(--stroke)}.bonus-title{font-family:var(--fd);font-size:14px;color:var(--stroke);margin-bottom:6px}.stars{display:flex;gap:4px;flex-wrap:wrap;font-size:18px}.stars span{transition:all 0.3s}

/* NUOVI STILI PER LA RUOTA FISICA */
.physical-wheel-guide{margin:14px 24px 8px;padding:14px 18px;background:linear-gradient(135deg,#fff9e6,#fff3cd);border:3px solid #ffc107;border-radius:12px;display:flex;align-items:center;gap:12px}
.physical-wheel-guide .guide-icon{font-size:32px}
.physical-wheel-guide .guide-text{font-size:12px;font-weight:900;color:#856404;line-height:1.5}
.physical-wheel-guide .guide-text b{color:#664d03;font-size:13px}

.diy-spinner-section{margin:12px 24px 16px;padding:16px;background:#f8f9fa;border:2px dashed var(--stroke);border-radius:12px;text-align:center}
.diy-spinner-section h3{font-family:var(--fd);font-size:18px;color:var(--stroke);margin-bottom:10px}
.diy-spinner-section .spinner-parts{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px}
.spinner-part{text-align:center;font-size:11px;font-weight:800;color:#666}
.spinner-part .part-icon{font-size:28px;display:block;margin-bottom:4px}

.ws-footer{padding:10px 24px;border-top:3px solid var(--stroke);display:flex;justify-content:space-between;align-items:center;background:#f8f9fa}.footer-l{font-size:10px;font-weight:900;color:#999}.footer-r{background:var(--stroke);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:999px;font-family:var(--fd)}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{display:block;background:#fff!important;overflow:visible!important;height:auto!important}
  #sb{display:none!important}
  #main{padding:0!important;display:block!important;overflow:visible!important}
  #sheetWrap{display:block!important;width:100%!important;height:auto!important}
  .sheet{transform:none!important;border-radius:0!important;box-shadow:none!important;width:100%!important;overflow:visible!important;page-break-after:always}
  .wheel-zone,.cards-zone,.footer-bonus,.physical-wheel-guide,.diy-spinner-section{page-break-inside:avoid}
  .spin-btn{display:none!important}
  .task-card{break-inside:avoid}
}
</style>
</head>
<body>
<div id="sb">
  <div class="logo">
    <svg width="36" height="36" viewBox="0 0 36 36"><defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#1f6feb"/></linearGradient></defs><circle cx="18" cy="18" r="17" fill="url(#wg)" stroke="#30363d" stroke-width="1.5"/><circle cx="18" cy="18" r="3" fill="#fff"/><path d="M18 5 L21 15 L18 18 Z" fill="rgba(255,255,255,.9)"/><path d="M31 18 L21 21 L18 18 Z" fill="rgba(255,255,255,.6)"/><path d="M18 31 L15 21 L18 18 Z" fill="rgba(255,255,255,.4)"/><path d="M5 18 L15 15 L18 18 Z" fill="rgba(255,255,255,.75)"/></svg>
    <div class="logo-t">Spin & <span>Learn</span></div>
  </div>
  <p class="app-desc">🌀 Interactive + Printable Wheel Generator</p>

  <div class="cg">
    <span class="lbl">🎨 Niche</span>
    <div class="ng" id="nicheGrid"></div>
    <input id="customN" type="text" placeholder="✏️ Custom niche...">
  </div>

  <div class="cg">
    <span class="lbl">🍕 Wheel Slices</span>
    <select id="slices" onchange="generate()">
      <option value="4">4 slices — Simple</option>
      <option value="6" selected>6 slices — Standard</option>
      <option value="8">8 slices — Advanced</option>
    </select>
    <span class="lbl" style="margin-top:4px">👶 Age Group</span>
    <select id="age" onchange="generate()">
      <option value="prek">Pre-K (Ages 3–4)</option>
      <option value="kinder" selected>Kindergarten (Ages 5–6)</option>
      <option value="grade1">Grade 1–2 (Ages 6–8)</option>
    </select>
    <span class="lbl" style="margin-top:4px">🌈 Color Theme</span>
    <select id="theme" onchange="generate()">
      <option value="rainbow" selected>Rainbow</option>
      <option value="pastel">Pastel</option>
      <option value="bold">Bold Primary</option>
      <option value="earthy">Earthy Warm</option>
    </select>
  </div>

  <button class="btn-gen" onclick="generate()">✨ GENERATE WHEEL</button>
  <div class="nav-row">
    <button class="nav-btn" onclick="prev()">◀ Prev</button>
    <span class="nav-num" id="navNum">1/10</span>
    <button class="nav-btn" onclick="next()">Next ▶</button>
  </div>
  <button class="btn-sec" onclick="spinWheel()">🌀 Spin Wheel</button>
  <button class="btn-sec" onclick="savePNG()">💾 Save PNG</button>
  <button class="btn-sec" onclick="window.print()">🖨️ Print</button>

  <div class="info">
    <b>✅ Dual-Mode Value:</b><br>
    • <b>Digital:</b> Interactive wheel + clickable tasks<br>
    • <b>Printed:</b> DIY spinner guide + pencil activities<br>
    • Wheel stays functional forever!
  </div>
</div>

<div id="main"><div id="sheetWrap"></div></div>

<script>
const THEMES={rainbow:['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9a3c','#ff6b9d','#00c9a7'],pastel:['#ffb3ba','#ffdfba','#ffffba','#baffc9','#bae1ff','#e8baff','#ffc8dd','#b5ead7'],bold:['#e63946','#f4a261','#2a9d8f','#e9c46a','#264653','#f77f00','#d62828','#606c38'],earthy:['#bc6c25','#dda15e','#606c38','#a7c957','#386641','#6a994e','#bc4749','#f2cc8f']};
const NICHES={
  "Magical Unicorns":{icon:"🦄",chars:[{e:"🦄",n:"Unicorn"},{e:"🧚",n:"Fairy"},{e:"🌟",n:"Star"},{e:"🔮",n:"Crystal"},{e:"🌈",n:"Rainbow"},{e:"💎",n:"Gem"},{e:"👑",n:"Crown"},{e:"🌸",n:"Flower"}]},
  "Dinosaur World":{icon:"🦕",chars:[{e:"🦕",n:"Bronto"},{e:"🦖",n:"T-Rex"},{e:"🥚",n:"Dino Egg"},{e:"🌋",n:"Volcano"},{e:"🦴",n:"Bone"},{e:"🌿",n:"Fern"},{e:"🐾",n:"Track"},{e:"🪨",n:"Rock"}]},
  "Halloween":{icon:"🎃",chars:[{e:"🎃",n:"Pumpkin"},{e:"👻",n:"Ghost"},{e:"🦇",n:"Bat"},{e:"🧙‍♀️",n:"Witch"},{e:"💀",n:"Skull"},{e:"🕷️",n:"Spider"},{e:"🕯️",n:"Candle"},{e:"🌙",n:"Moon"}]},
  "Space Kittens":{icon:"🐱",chars:[{e:"🐱",n:"Kitten"},{e:"🚀",n:"Rocket"},{e:"🪐",n:"Planet"},{e:"⭐",n:"Star"},{e:"🛸",n:"UFO"},{e:"☄️",n:"Comet"},{e:"🌙",n:"Moon"},{e:"👨‍🚀",n:"Astro"}]},
  "Ocean Babies":{icon:"🦈",chars:[{e:"🦈",n:"Shark"},{e:"🐙",n:"Octopus"},{e:"🐬",n:"Dolphin"},{e:"🦀",n:"Crab"},{e:"🐢",n:"Turtle"},{e:"🪼",n:"Jellyfish"},{e:"🐡",n:"Puffer"},{e:"🦞",n:"Lobster"}]},
  "Pirate Island":{icon:"🏴‍☠️",chars:[{e:"🏴‍☠️",n:"Pirate"},{e:"⚓",n:"Anchor"},{e:"🦜",n:"Parrot"},{e:"💰",n:"Treasure"},{e:"🧭",n:"Compass"},{e:"🚢",n:"Ship"},{e:"🗺️",n:"Map"},{e:"💀",n:"Skull"}]},
  "Farm Animals":{icon:"🐄",chars:[{e:"🐄",n:"Cow"},{e:"🐷",n:"Pig"},{e:"🐔",n:"Chicken"},{e:"🐑",n:"Sheep"},{e:"🐴",n:"Horse"},{e:"🦆",n:"Duck"},{e:"🐇",n:"Rabbit"},{e:"🐝",n:"Bee"}]},
  "Tiny Bakers":{icon:"👨‍🍳",chars:[{e:"🧁",n:"Cupcake"},{e:"🍪",n:"Cookie"},{e:"🎂",n:"Cake"},{e:"🍩",n:"Donut"},{e:"🥐",n:"Croissant"},{e:"🍞",n:"Bread"},{e:"🍰",n:"Slice"},{e:"🧇",n:"Waffle"}]}
};
const AGE_ACTIONS={
  prek:['color','count','find','draw'],
  kinder:['color','trace','count','find','draw','copy'],
  grade1:['color','trace','count','find','match','name','draw','copy']
};
const rnd=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
let currNiche='Magical Unicorns', sheets=[], idx=0, currentRotation=0;

function initSidebar(){
  const g=document.getElementById('nicheGrid');
  Object.keys(NICHES).forEach((k,i)=>{const b=document.createElement('button');b.className='nb'+(i===0?' on':'');b.innerHTML=NICHES[k].icon+' '+k.split(' ')[0];b.onclick=()=>{document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));b.classList.add('on');currNiche=k;document.getElementById('customN').value='';generate();};g.appendChild(b);});
  document.getElementById('customN').oninput=function(){const v=this.value.trim();if(v.length<3)return;document.querySelectorAll('.nb').forEach(x=>x.classList.remove('on'));NICHES[v]={icon:'🎨',chars:[{e:'🎯',n:v+' 1'},{e:'🎲',n:v+' 2'},{e:'🎪',n:v+' 3'},{e:'🎨',n:v+' 4'},{e:'🎭',n:v+' 5'},{e:'🎠',n:v+' 6'},{e:'🎡',n:v+' 7'},{e:'🎢',n:v+' 8'}]};currNiche=v;generate();};
}

function makeTask(type,ch){
  if(type==='color') return {title:'🎨 COLOR IT',sub:`Color the ${ch.n}.`,html:`<div class="big-color-target">${ch.e}</div><div class="trace-write">Use any colors you like</div>`};
  
  if(type==='trace') return {
    title:'✏️ TRACE IT',
    sub:`Trace the ${ch.n} shape/emoji and write below.`,
    html:`<div class="trace-lines"><span class="trace-char" style="opacity:0.3">${ch.e}</span><span class="trace-char" style="opacity:0.5">${ch.e}</span><span class="trace-char" style="opacity:0.8">${ch.e}</span></div>
    <div class="trace-write">Trace and write: <input type="text" class="task-input" placeholder="Write here..." style="width:120px"></div>`
  };
  
  if(type==='count'){
    const c=3+Math.floor(Math.random()*4);
    return {
      title:'🔢 COUNT IT',
      sub:`Count the ${ch.n}s and write the number.`,
      html:`<div class="count-row">${Array.from({length:c}).map(()=>`<span class="count-item">${ch.e}</span>`).join('')}</div>
      <div class="count-answer">I count: <input type="number" class="task-input" min="0" max="20" style="width:60px;font-size:16px"></div>`
    };
  }
  
  if(type==='find'){
    const other=rnd(NICHES[currNiche].chars.filter(x=>x.e!==ch.e));
    const pos=Math.floor(Math.random()*6);
    const arr=Array.from({length:6}).map((_,i)=>i===pos?other.e:ch.e);
    return {
      title:'🔍 FIND IT',
      sub:`Click the one that is different.`,
      html:`<div class="find-row">${arr.map((x,i)=>`<div class="find-box" data-index="${i}" data-odd="${i===pos}">${x}</div>`).join('')}</div>
      <div class="find-answer">Click the odd one out</div>`
    };
  }
  
  if(type==='match'){
    const others=shuffle(NICHES[currNiche].chars.filter(x=>x.e!==ch.e)).slice(0,1);
    const left=[ch,...others];
    const right=shuffle([ch,...others]);
    return {
      title:'🔗 MATCH IT',
      sub:`Click matching pairs (left then right).`,
      html:`<div class="match-row">
        <div class="match-col">${left.map((x,i)=>`<div class="match-item" data-pair="${x.e}" data-side="left">${x.e}</div>`).join('')}</div>
        <div class="match-center">${left.map(()=>`<div class="match-line"></div>`).join('')}</div>
        <div class="match-col">${right.map((x,i)=>`<div class="match-item" data-pair="${x.e}" data-side="right">${x.e}</div>`).join('')}</div>
      </div>`
    };
  }
  
  if(type==='name') return {
    title:'🔤 NAME IT',
    sub:`Say and write the name.`,
    html:`<div class="name-row">${ch.e}</div>
    <div class="name-write">This is a <input type="text" class="task-input" placeholder="write name" style="width:150px;font-size:16px"></div>`
  };
  
  if(type==='copy'){
    const pattern=[ch.e,ch.e,'⭐'];
    return {
      title:'📋 COPY IT',
      sub:`Copy the pattern in the empty box.`,
      html:`<div class="copy-wrap"><div class="copy-box">${pattern.join(' ')}</div><div class="copy-arrow">→</div>
      <div class="copy-box"><input type="text" class="task-input" placeholder="Copy here" style="width:100%;font-size:20px;border:none"></div></div>`
    };
  }
  
  if(type==='draw') return {
    title:'✏️ DRAW IT',
    sub:`Draw your own ${ch.n}.`,
    html:`<div class="name-row">${ch.e}</div>
    <canvas class="draw-canvas" width="200" height="66"></canvas>`
  };
  
  return {title:'✏️ DRAW IT',sub:`Draw your own ${ch.n}.`,html:`<div class="name-row">${ch.e}</div><div class="draw-area"></div>`};
}

function buildWheel(chars, colors, n){
  const cx=180,cy=180,r=165,ri=34,angle=360/n; let segs='',labels='',icons='';
  for(let i=0;i<n;i++){
    const a1=(i*angle-90)*Math.PI/180, a2=((i+1)*angle-90)*Math.PI/180;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1), x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const xi1=cx+ri*Math.cos(a1), yi1=cy+ri*Math.sin(a1), xi2=cx+ri*Math.cos(a2), yi2=cy+ri*Math.sin(a2);
    const col=colors[i%colors.length], mid=(a1+a2)/2, ex=cx+r*0.64*Math.cos(mid), ey=cy+r*0.64*Math.sin(mid), nx=cx+r*0.88*Math.cos(mid), ny=cy+r*0.88*Math.sin(mid);
    segs += `<path d="M${xi1},${yi1} A${ri},${ri} 0 0,1 ${xi2},${yi2} L${x2},${y2} A${r},${r} 0 0,0 ${x1},${y1} Z" fill="${col}" stroke="white" stroke-width="3"/>`;
    icons += `<text x="${ex}" y="${ey+8}" text-anchor="middle" font-size="28">${chars[i].e}</text>`;
    labels += `<text x="${nx}" y="${ny+5}" text-anchor="middle" font-family="Fredoka One,sans-serif" font-size="13" fill="white" font-weight="900" stroke="#1e272e" stroke-width="3" paint-order="stroke">${i+1}</text>`;
  }
  return `<svg width="360" height="360" viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg"><circle cx="180" cy="180" r="171" fill="#1e272e"/><circle cx="180" cy="180" r="168" fill="#fff"/>${segs}${icons}${labels}<circle cx="180" cy="180" r="40" fill="#1e272e"/><circle cx="180" cy="180" r="28" fill="#fff"/><circle cx="180" cy="180" r="22" fill="#1e272e"/><text x="180" y="186" text-anchor="middle" font-family="Fredoka One,sans-serif" font-size="16" fill="white">GO</text></svg>`;
}

function buildPhysicalWheelGuide(n, charPick){
  const steps = [
    "1️⃣ Cut out the wheel circle",
    "2️⃣ Push a brass fastener through the center dot", 
    "3️⃣ Attach a paperclip as the spinner arrow",
    "4️⃣ Flick the paperclip to spin!"
  ];
  
  return `
  <div class="physical-wheel-guide">
    <div class="guide-icon">✂️</div>
    <div class="guide-text">
      <b>📋 PRINTED MODE: Make Your Own Spinner!</b><br>
      ${steps.join(' · ')}<br>
      <span style="font-size:11px">🎯 When the paperclip stops, do the matching numbered task below!</span>
    </div>
  </div>
  <div class="diy-spinner-section">
    <h3>🛠️ DIY Spinner Kit</h3>
    <p style="font-size:12px;color:#666;margin-bottom:8px">Everything you need is on this page:</p>
    <div class="spinner-parts">
      <div class="spinner-part"><span class="part-icon">🎡</span>Wheel above</div>
      <div class="spinner-part"><span class="part-icon">📌</span>Brass fastener<br>(center hole)</div>
      <div class="spinner-part"><span class="part-icon">📎</span>Paperclip<br>(bend as arrow)</div>
      <div class="spinner-part"><span class="part-icon">📋</span>Task cards<br>below</div>
    </div>
    <p style="font-size:10px;color:#888;margin-top:10px;font-weight:900">
      ⭐ PRO TIP: Laminate the wheel + cards. Use a dry-erase marker for endless fun!
    </p>
  </div>`;
}

function generate(){
  const n=parseInt(document.getElementById('slices').value), age=document.getElementById('age').value, nd=NICHES[currNiche];
  sheets=[];
  for(let s=0;s<10;s++){
    const charPick=shuffle([...nd.chars]).slice(0,n);
    const allowed=AGE_ACTIONS[age];
    const tasks=charPick.map(ch=>makeTask(rnd(allowed), ch));
    sheets.push({charPick,tasks});
  }
  idx=0; currentRotation=0; renderSheet();
}

function renderSheet(){
  const n=parseInt(document.getElementById('slices').value), theme=document.getElementById('theme').value, age=document.getElementById('age').value;
  const nd=NICHES[currNiche], colors=THEMES[theme], {charPick,tasks}=sheets[idx], ageLabel={prek:'Pre-K (Ages 3-4)',kinder:'Kindergarten (Ages 5-6)',grade1:'Grade 1-2 (Ages 6-8)'}[age];
  const wheel=buildWheel(charPick, colors, n);
  const cards=tasks.map((t,i)=>`<div class="task-card" style="background:${colors[i%colors.length]}22;border-color:${colors[i%colors.length]}"><div class="task-head"><div class="task-num" style="background:${colors[i%colors.length]}">${i+1}</div><div><div class="task-title">${t.title}</div><div class="task-sub">${t.sub}</div></div></div><div class="task-body"><div class="mini-icon">${charPick[i].e}</div><div class="task-area">${t.html}</div></div></div>`).join('');
  const physicalGuide = buildPhysicalWheelGuide(n, charPick);
  
  document.getElementById('sheetWrap').innerHTML=`<div class="sheet" id="curSheet">
    <div class="ws-hdr" style="background:${colors[0]}22;border-bottom-color:${colors[0]}">
      <div class="ws-hdr-left"><h1>🌀 Spin & Learn Wheel</h1><p>${nd.icon} ${currNiche} · ${ageLabel} · ${n} Functional Activities</p></div>
      <div class="ws-fields">
        <div class="ws-field"><span>Name:</span><div class="field-line"></div></div>
        <div class="ws-field"><span>Date:</span><div class="field-line"></div></div>
        <div class="ws-field"><span>Score:</span><div class="field-line"></div><span>/ ${n}</span></div>
      </div>
    </div>
    <div class="instr-banner"><span style="font-size:22px">👉</span><span><b>DIGITAL:</b> Click wheel to spin · <b>PRINT:</b> Cut out wheel + use paperclip spinner</span></div>
    <div class="wheel-zone">
      <div class="wheel-top-note">🎯 Interactive digital wheel (click to spin) OR cut out for physical spinner</div>
      <div class="real-spinner-wrap">
        <div class="pointer-top"></div>
        <div class="spinner-stage"><div id="wheelSvgWrap">${wheel}</div></div>
      </div>
      <button class="spin-btn" onclick="spinWheel()">🌀 SPIN THE WHEEL</button>
      <div class="result-banner" id="resultBanner">Click the wheel or button above to get your activity</div>
    </div>
    ${physicalGuide}
    <div class="cards-zone">${cards}</div>
    <div class="footer-bonus">
      <div class="bonus-box"><div class="bonus-title">⭐ Color a star after each completed task</div><div class="stars">${'<span>☆</span>'.repeat(n)}</div></div>
      <div class="bonus-box"><div class="bonus-title">🏁 Finish Line</div><div style="font-size:12px;font-weight:900;color:#666">Complete all ${n} tasks to finish the worksheet</div></div>
    </div>
    <div class="ws-footer"><span class="footer-l">© ${currNiche} Spin & Learn · Worksheet Studio | Digital + Physical Spinner System</span><span class="footer-r">Card ${idx+1} of 10</span></div>
  </div>`;
  
  requestAnimationFrame(()=>{
    const el=document.getElementById('curSheet');
    if(!el)return;
    const avail=document.getElementById('main').clientWidth-40;
    const scale=Math.min(1,avail/794);
    el.style.transform=`scale(${scale})`;
    document.getElementById('sheetWrap').style.height=Math.ceil(el.offsetHeight*scale+40)+'px';
    attachWheelSpin();
    enableInteractivity();
  });
  document.getElementById('navNum').textContent=`${idx+1}/10`;
}

function enableInteractivity(){
  // Task completion toggle
  document.querySelectorAll('.task-card').forEach(card => {
    card.onclick = function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'CANVAS' || 
          e.target.classList.contains('find-box') || e.target.classList.contains('match-item')) return;
      this.classList.toggle('completed');
      updateStars();
    };
  });
  
  // Find the odd one out
  document.querySelectorAll('.find-box').forEach(box => {
    box.onclick = function(e) {
      e.stopPropagation();
      document.querySelectorAll('.find-box').forEach(b => b.classList.remove('circled'));
      this.classList.add('circled');
      if (this.dataset.odd === 'true') {
        this.closest('.task-card').classList.add('completed');
        updateStars();
      }
    };
  });
  
  // Match pairs
  let matchSelection = null;
  document.querySelectorAll('.match-item').forEach(item => {
    item.onclick = function(e) {
      e.stopPropagation();
      if (this.classList.contains('matched')) return;
      
      if (!matchSelection) {
        document.querySelectorAll('.match-item').forEach(i => i.classList.remove('selected'));
        this.classList.add('selected');
        matchSelection = this;
      } else {
        if (this.dataset.pair === matchSelection.dataset.pair && this.dataset.side !== matchSelection.dataset.side) {
          this.classList.add('matched');
          matchSelection.classList.add('matched');
          this.style.background = '#d4edda';
          matchSelection.style.background = '#d4edda';
          
          const allMatched = this.closest('.match-row').querySelectorAll('.match-item:not(.matched)').length === 0;
          if (allMatched) {
            this.closest('.task-card').classList.add('completed');
            updateStars();
          }
        }
        matchSelection.classList.remove('selected');
        matchSelection = null;
      }
    };
  });
  
  // Enable drawing on canvases
  document.querySelectorAll('.draw-canvas').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#1e272e';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    let drawing = false;
    
    const startDraw = (x, y) => {
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
    };
    
    const draw = (x, y) => {
      if (!drawing) return;
      ctx.lineTo(x, y);
      ctx.stroke();
    };
    
    const stopDraw = () => { drawing = false; };
    
    canvas.onmousedown = (e) => { e.stopPropagation(); const rect = canvas.getBoundingClientRect(); startDraw(e.clientX - rect.left, e.clientY - rect.top); };
    canvas.onmousemove = (e) => { e.stopPropagation(); const rect = canvas.getBoundingClientRect(); draw(e.clientX - rect.left, e.clientY - rect.top); };
    canvas.onmouseup = stopDraw;
    canvas.onmouseleave = stopDraw;
    
    canvas.ontouchstart = (e) => { e.stopPropagation(); e.preventDefault(); const rect = canvas.getBoundingClientRect(); startDraw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); };
    canvas.ontouchmove = (e) => { e.stopPropagation(); e.preventDefault(); const rect = canvas.getBoundingClientRect(); draw(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); };
    canvas.ontouchend = stopDraw;
  });
}

function updateStars(){
  const completed = document.querySelectorAll('.task-card.completed').length;
  const stars = document.querySelectorAll('.stars span');
  stars.forEach((star, i) => {
    star.textContent = i < completed ? '★' : '☆';
    if (i < completed) {
      star.style.color = '#ffd700';
      star.style.fontSize = '22px';
    } else {
      star.style.color = '';
      star.style.fontSize = '';
    }
  });
}

function attachWheelSpin(){
  const w=document.getElementById('wheelSvgWrap'); 
  if(w){
    w.onclick=spinWheel; 
    w.style.cursor='pointer';
  }
}

function spinWheel(){
  const n=parseInt(document.getElementById('slices').value); 
  const {tasks}=sheets[idx]; 
  const target=Math.floor(Math.random()*n)+1; 
  const angle=360/n; 
  const spins=5+Math.floor(Math.random()*3); 
  const final = spins*360 + (360 - ((target-1)*angle + angle/2)); 
  currentRotation += final; 
  const wheel=document.getElementById('wheelSvgWrap'); 
  if(!wheel)return; 
  wheel.style.transform=`rotate(${currentRotation}deg)`; 
  const t=tasks[target-1]; 
  const rb=document.getElementById('resultBanner'); 
  rb.innerHTML=`🎯 Landing on <b>#${target}</b> — ${t.title.replace(/^[^A-Za-z0-9]+\s*/,'')} · Complete card ${target} below`;
  
  setTimeout(() => {
    document.querySelectorAll('.task-card').forEach((card, i) => {
      if (i === target - 1) {
        card.style.transform = 'scale(1.05)';
        card.style.boxShadow = '0 0 20px rgba(31,111,235,0.5)';
        setTimeout(() => {
          card.style.transform = '';
          card.style.boxShadow = '';
        }, 2000);
      }
    });
  }, 4200);
}

function prev(){
  if(idx>0){idx--;currentRotation=0;renderSheet();}
}

function next(){
  if(idx<9){idx++;currentRotation=0;renderSheet();}
}

function savePNG(){
  const el=document.getElementById('curSheet'); 
  if(!el)return; 
  const saved = el.style.transform; 
  el.style.transform='none';
  
  const inputs = el.querySelectorAll('input');
  const replacements = [];
  
  inputs.forEach(inp => {
    const span = document.createElement('span');
    span.textContent = inp.value || '______';
    span.style.cssText = inp.style.cssText;
    span.style.display = 'inline-block';
    span.style.minWidth = '50px';
    inp.parentNode.replaceChild(span, inp);
    replacements.push({span, inp});
  });
  
  htmlToImage.toPng(el, {pixelRatio: 2, backgroundColor: '#fff'}).then(url => {
    replacements.forEach(({span, inp}) => {
      span.parentNode.replaceChild(inp, span);
    });
    
    const a=document.createElement('a');
    a.download=`spin-learn-${currNiche.replace(/\s+/g,'-').toLowerCase()}-${idx+1}.png`;
    a.href=url;
    a.click();
  }).catch(err => {
    replacements.forEach(({span, inp}) => {
      if (span.parentNode) span.parentNode.replaceChild(inp, span);
    });
    console.error('PNG save failed:', err);
  }).finally(() => {
    el.style.transform = saved;
  });
}

initSidebar(); 
generate();
</script>
</body>
</html>
