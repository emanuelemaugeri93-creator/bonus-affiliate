
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Midlife Self-Discovery Worksheet Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

:root {
  --sb:#0D0D0D;
  --stroke:#0D0D0D;
  --paper:#fff;
}

/* ── THEMES ── */
[data-theme="fire"]  { --bg:#FFF5F0; --c1:#FFE4D6; --c2:#FFC9AD; --c3:#FFB089; --acc:#D4380D; --acc2:#FF6B35; --soft:#FF9066; --txt:#2D1206; }
[data-theme="electric"] { --bg:#F0F0FF; --c1:#E0E0FF; --c2:#C4C4FF; --c3:#A5A5FF; --acc:#4338CA; --acc2:#6D28D9; --soft:#7C3AED; --txt:#1E1B4B; }
[data-theme="neon"]  { --bg:#F0FFF8; --c1:#CCFCE8; --c2:#99F6C8; --c3:#6EE7A0; --acc:#059669; --acc2:#047857; --soft:#10B981; --txt:#022C22; }
[data-theme="gold"]  { --bg:#FFFBEB; --c1:#FEF3C7; --c2:#FDE68A; --c3:#FCD34D; --acc:#B45309; --acc2:#D97706; --soft:#F59E0B; --txt:#1C1200; }
[data-theme="ink"]   { --bg:#F8F8F8; --c1:#EBEBEB; --c2:#D6D6D6; --c3:#C2C2C2; --acc:#0D0D0D; --acc2:#333; --soft:#555; --txt:#0D0D0D; }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100vh;overflow:hidden;font-family:'Plus Jakarta Sans',system-ui,sans-serif}
body{display:flex;background:#0D0D0D;-webkit-font-smoothing:antialiased}

/* ════ SIDEBAR ════ */
#sidebar{
  width:300px;min-width:300px;
  background:linear-gradient(180deg,#141414 0%,#0D0D0D 100%);
  padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
  border-right:1px solid rgba(255,255,255,.07);scrollbar-width:none;z-index:10;
}
#sidebar::-webkit-scrollbar{display:none}

.sb-logo{
  display:flex;align-items:center;gap:10px;padding-bottom:14px;
  border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:2px;
}
.sb-logo-mark{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#FF6B35,#D4380D);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 16px rgba(212,56,13,.45);
}
.sb-title{font-family:'Fraunces',serif;font-size:15px;font-weight:900;color:#fff;line-height:1.2}
.sb-title span{display:block;font-size:10px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;color:rgba(255,255,255,.4);margin-top:2px;font-style:normal;letter-spacing:.05em}

.cg{background:rgba(255,255,255,.04);padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.07)}
.cl{display:block;font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:7px}

select{
  width:100%;padding:9px 12px;border-radius:10px;
  border:1.5px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);
  color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:12.5px;font-weight:600;
  cursor:pointer;outline:none;appearance:none;transition:.15s;
  background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 12px center;padding-right:32px;
}
select option{background:#1a1a1a;color:#fff}
select:focus{border-color:rgba(255,107,53,.6);background:rgba(255,107,53,.08)}

/* Theme Pills */
.theme-pills{display:flex;flex-wrap:wrap;gap:6px}
.tp{
  padding:6px 11px;border-radius:var(--rf,9999px);border:1.5px solid rgba(255,255,255,.1);
  font-size:11px;font-weight:700;color:rgba(255,255,255,.5);cursor:pointer;transition:.15s;
  background:transparent;
}
.tp:hover{border-color:rgba(255,255,255,.3);color:#fff}
.tp.on{border-color:var(--pill-c,#FF6B35);color:var(--pill-c,#FF6B35);background:rgba(255,107,53,.1)}
.tp[data-t="fire"]{--pill-c:#FF6B35}
.tp[data-t="electric"]{--pill-c:#7C3AED}
.tp[data-t="neon"]{--pill-c:#10B981}
.tp[data-t="gold"]{--pill-c:#F59E0B}
.tp[data-t="ink"]{--pill-c:#aaa}

/* Depth pills */
.depth-pills{display:flex;gap:5px;flex-direction:column}
.dp{
  padding:8px 12px;border-radius:10px;border:1.5px solid rgba(255,255,255,.08);
  font-size:11.5px;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;transition:.15s;
  text-align:left;background:transparent;
  display:flex;align-items:center;gap:7px;
}
.dp:hover{background:rgba(255,255,255,.06);color:#fff}
.dp.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#fff}
.dp .dp-icon{font-size:14px}
.dp .dp-label{font-weight:700;font-size:12px;display:block}
.dp .dp-sub{font-size:10px;opacity:.55;display:block;font-weight:400;margin-top:1px}

/* Cat pill grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cp{
  padding:7px 8px;border-radius:9px;border:1.5px solid rgba(255,255,255,.07);
  font-size:10.5px;font-weight:600;color:rgba(255,255,255,.4);cursor:pointer;transition:.15s;
  background:transparent;text-align:center;line-height:1.3;
}
.cp:hover{background:rgba(255,255,255,.07);color:#fff}
.cp.on{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.4);color:#FF6B35}

/* Buttons */
.btn-main{
  width:100%;padding:11px;border-radius:12px;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:800;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-main:active{transform:scale(.97)}
.btn-gen{
  background:linear-gradient(135deg,#FF6B35 0%,#D4380D 100%);
  color:#fff;box-shadow:0 4px 18px rgba(212,56,13,.45);
  margin-bottom:7px;
}
.btn-gen:hover{box-shadow:0 6px 24px rgba(212,56,13,.6)}
.btn-sec{
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.1);
  margin-bottom:7px;font-size:12px;font-weight:700;
}
.btn-sec:hover{background:rgba(255,255,255,.12);color:#fff}
.btn-white{
  background:#fff;color:#0D0D0D;
  font-size:12px;font-weight:800;
}
.btn-white:hover{background:#f0f0f0}

.hint{font-size:9.5px;color:rgba(255,255,255,.25);text-align:center;line-height:1.55;padding:0 4px}

/* ════ PREVIEW ════ */
#preview-area{
  flex:1;padding:28px;overflow-y:auto;
  display:flex;justify-content:center;align-items:flex-start;
  background:#111;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:40px 40px;
  scrollbar-width:none;
}
#preview-area::-webkit-scrollbar{display:none}

/* ════ A4 PAGE ════ */
.ws-page{
  width:210mm;height:297mm;min-height:297mm;max-height:297mm;
  background:var(--bg);
  border-radius:0;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.05);
  position:relative;
  display:flex;flex-direction:column;
  color:var(--txt);overflow:hidden;
  font-family:'Plus Jakarta Sans',sans-serif;
}

/* Left accent stripe */
.ws-stripe{
  position:absolute;left:0;top:0;bottom:0;width:8px;
  background:linear-gradient(180deg,var(--acc) 0%,var(--acc2) 50%,var(--soft) 100%);
  z-index:2;
}

/* Top bar */
.ws-topbar{
  background:var(--acc);
  padding:10px 14mm 10px 18mm;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ws-eyebrow{font-size:8px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.ws-topbar-right{display:flex;gap:5px}
.ws-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3)}
.ws-dot:first-child{background:rgba(255,255,255,.7)}

/* Header */
.ws-header{
  padding:7mm 14mm 5mm 18mm;
  display:flex;gap:10mm;align-items:flex-start;
  flex-shrink:0;
  border-bottom:2px solid var(--c2);
}
.ws-header-l{flex:1}
.ws-cat-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--c2);color:var(--acc);
  font-size:9px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;margin-bottom:5px;
  border:1.5px solid var(--c3);
}
.ws-title{
  font-family:'Fraunces',serif;font-size:34px;font-weight:900;
  color:var(--txt);line-height:1;letter-spacing:-.5px;margin-bottom:4px;
}
.ws-subtitle{font-size:10.5px;color:var(--soft);font-weight:500;line-height:1.45;max-width:320px}
.ws-header-r{width:155px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.info-row{display:flex;align-items:flex-end;gap:5px;font-size:10px;font-weight:700;color:var(--txt)}
.info-line{flex:1;border-bottom:1.5px dashed var(--c3);height:14px}

/* Content */
.ws-body{
  flex:1;min-height:0;
  padding:5mm 14mm 4mm 18mm;
  display:flex;flex-direction:column;gap:2.8mm;
}

/* Prompt cards */
.prompt-card{
  background:var(--paper);
  border:1.5px solid var(--c2);
  border-radius:10px;
  padding:3.5mm 4mm;
  display:flex;gap:3.5mm;
  flex:1;min-height:0;
  position:relative;
  overflow:hidden;
}
.prompt-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--acc),var(--soft));
  border-radius:0 2px 2px 0;
}
.prompt-num{
  font-family:'Fraunces',serif;font-size:22px;font-weight:900;
  color:var(--c3);line-height:1;flex-shrink:0;width:20px;margin-top:1px;
}
.prompt-inner{flex:1;display:flex;flex-direction:column;gap:2mm}
.prompt-q{font-size:10px;font-weight:600;color:var(--txt);line-height:1.45}
.lines{display:flex;flex-direction:column;gap:2mm;flex:1;justify-content:flex-end}
.line{height:1px;background:var(--c2);border-radius:1px}

/* Insight */
.ws-insight{
  margin:0 14mm 4mm 18mm;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  border-radius:10px;padding:3mm 4.5mm;
  display:flex;gap:3mm;align-items:center;flex-shrink:0;
}
.insight-ico{font-size:20px;flex-shrink:0}
.insight-r{flex:1}
.insight-lbl{font-size:8px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:2mm}
.insight-lines{display:flex;flex-direction:column;gap:2mm}
.insight-line{height:1px;background:rgba(255,255,255,.3);border-radius:1px}

/* Footer */
.ws-footer{
  padding:2.5mm 14mm 3.5mm 18mm;
  border-top:1.5px solid var(--c2);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
.ws-footer-l{font-size:8px;color:var(--soft);font-weight:500}
.ws-footer-l strong{font-family:'Fraunces',serif;font-style:italic;color:var(--acc);font-weight:700}
.ws-num{
  width:24px;height:24px;border-radius:8px;
  background:var(--acc);color:#fff;
  font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
}

/* Editable */
[contenteditable="true"]{outline:none;border-radius:3px;border:1px dashed transparent;transition:.15s;cursor:text}
[contenteditable="true"]:hover,[contenteditable="true"]:focus{background:rgba(0,0,0,.04);border-color:var(--acc)}

/* Print */
@page{size:A4 portrait;margin:0}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{background:none;margin:0;padding:0;display:block;overflow:hidden}
  #sidebar,.hint{display:none!important}
  #preview-area{padding:0;display:block;background:none}
  .ws-page{
    margin:0;width:100%;height:100vh;max-height:100vh;
    box-shadow:none!important;
    page-break-inside:avoid;
  }
  [contenteditable="true"]{border:none!important;background:none!important}
}
</style>
</head>
<body data-theme="fire">

<!-- ════ SIDEBAR ════ -->
<div id="sidebar">

  <div class="sb-logo">
    <div class="sb-logo-mark">✦</div>
    <div class="sb-title">
      Worksheet Studio
      <span>Midlife Self-Discovery</span>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="cg">
    <span class="cl">✦ Theme Category</span>
    <div class="cat-grid">
      <button class="cp on" data-cat="identity"   onclick="setCat(this)">🪞 Identity</button>
      <button class="cp"    data-cat="purpose"    onclick="setCat(this)">🧭 Purpose</button>
      <button class="cp"    data-cat="relationships" onclick="setCat(this)">💛 Relationships</button>
      <button class="cp"    data-cat="burnout"    onclick="setCat(this)">🔥 Burnout</button>
      <button class="cp"    data-cat="legacy"     onclick="setCat(this)">🌿 Legacy</button>
      <button class="cp"    data-cat="secondchapter" onclick="setCat(this)">🚀 2nd Chapter</button>
      <button class="cp"    data-cat="body"       onclick="setCat(this)">🌸 Body</button>
      <button class="cp"    data-cat="grief"      onclick="setCat(this)">🌧️ Grief</button>
    </div>
  </div>

  <!-- DEPTH -->
  <div class="cg">
    <span class="cl">✦ Prompt Depth</span>
    <div class="depth-pills">
      <button class="dp on" data-d="reflective" onclick="setDepth(this)">
        <span class="dp-icon">🪞</span>
        <span><span class="dp-label">Reflective</span><span class="dp-sub">Gentle & introspective</span></span>
      </button>
      <button class="dp" data-d="courageous" onclick="setDepth(this)">
        <span class="dp-icon">⚡</span>
        <span><span class="dp-label">Courageous</span><span class="dp-sub">Bold & challenging</span></span>
      </button>
      <button class="dp" data-d="tender" onclick="setDepth(this)">
        <span class="dp-icon">🌸</span>
        <span><span class="dp-label">Tender</span><span class="dp-sub">Soft & compassionate</span></span>
      </button>
    </div>
  </div>

  <!-- PALETTE -->
  <div class="cg">
    <span class="cl">✦ Visual Palette</span>
    <div class="theme-pills">
      <button class="tp on" data-t="fire"     onclick="setTheme(this)">🔥 Fire</button>
      <button class="tp"    data-t="electric" onclick="setTheme(this)">⚡ Electric</button>
      <button class="tp"    data-t="neon"     onclick="setTheme(this)">🌿 Neon</button>
      <button class="tp"    data-t="gold"     onclick="setTheme(this)">✨ Gold</button>
      <button class="tp"    data-t="ink"      onclick="setTheme(this)">🖤 Ink</button>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:0">
    <button class="btn-main btn-gen" onclick="generate()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
      Generate Worksheet
    </button>
    <button class="btn-main btn-sec" onclick="saveAsPNG()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save as PNG
    </button>
    <button class="btn-main btn-white" onclick="window.print()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print A4
    </button>
  </div>

  <div class="hint">Click any text on the worksheet to edit it directly before printing.</div>

</div>

<!-- ════ PREVIEW ════ -->
<div id="preview-area">
  <div class="ws-page" id="worksheet"></div>
</div>

<script>
const CATS = {
  identity:{
    label:"🪞 Identity",title:"Who Am I Now?",
    subtitle:"A deep reflection on self — beyond roles, titles and the expectations of others.",
    icon:"🪞",
    reflective:[
      "If you stripped away every role you play — parent, partner, professional — what remains? Who is the person underneath all of it?",
      "What belief about yourself did you inherit from your family that you are now ready to examine, question or gently release?",
      "Describe a moment in the past year when you felt most authentically yourself. What were you doing, and who were you with?",
      "What parts of your younger self do you miss the most? Which parts are you genuinely glad you've grown beyond?",
      "If you could reintroduce yourself to the world — not by what you do, but by who you truly are — what would you say?",
    ],
    courageous:[
      "What truth about yourself are you still afraid to fully admit — even in private, even on this page?",
      "In what ways have you been living someone else's definition of success? What would YOUR definition actually look like?",
      "Name one version of yourself you've been suppressing for years. What would it mean to let that part exist openly?",
      "Where in your life are you still performing rather than truly living? What would stopping the performance feel like?",
      "What would you do differently tomorrow if you truly believed you were enough, exactly as you are right now?",
    ],
    tender:[
      "Write a loving letter to the younger version of you who didn't yet know how far you would come.",
      "What are three things about yourself that you are learning, slowly, to accept with more compassion?",
      "Where do you still carry shame or self-judgment? What would a truly kind friend say to you about this?",
      "What does your inner child most need to hear from the adult you have become?",
      "Describe one small, specific way you could be gentler with yourself starting tomorrow morning.",
    ]
  },
  purpose:{
    label:"🧭 Purpose",title:"What Truly Matters",
    subtitle:"Reconnecting with what lights you up, drives you forward and gives your life meaning.",
    icon:"🧭",
    reflective:[
      "When was the last time you completely lost track of time doing something? What were you doing, and what does that tell you?",
      "What problem in the world makes your heart ache the most? How might your life experience be part of the answer?",
      "List five things you were naturally drawn to as a child — before anyone told you what you 'should' do. Do any still call to you?",
      "What would you be doing with your time if money, external approval and practicality were simply not factors?",
      "Write one honest sentence that describes what you most want your life to actually be about in the next ten years.",
    ],
    courageous:[
      "What meaningful thing have you been postponing — waiting for the 'right moment' that may never arrive on its own?",
      "If this were the last decade of your life, what would you stop doing immediately? What would you finally start?",
      "What is the difference between your current life and the life your soul is quietly, persistently asking for?",
      "Name one dream you abandoned because someone said it wasn't realistic. Was it really theirs to decide?",
      "What legacy are you actively building right now — and is it truly yours, or one quietly assigned to you by others?",
    ],
    tender:[
      "What small, everyday moment makes you feel most alive and present? How can you deliberately invite more of it in?",
      "Write about a time you helped someone and felt, deeply and clearly, that you were in exactly the right place.",
      "What does a truly meaningful day look like for you — not a productive one, but a deeply, quietly meaningful one?",
      "What are you already giving the world simply by being exactly who you are — without trying, without effort?",
      "In what quiet, simple ways are you already living your purpose right now, without even fully realizing it?",
    ]
  },
  relationships:{
    label:"💛 Relationships",title:"Love & Connection",
    subtitle:"Exploring the bonds that shape us, heal us and call us toward our truest selves.",
    icon:"💛",
    reflective:[
      "Which relationship in your life currently gives you the most energy and aliveness? What specifically makes it feel that way?",
      "Are there relationships you maintain out of obligation rather than genuine love? What would healthy boundaries look like there?",
      "How has your relationship with yourself changed over the past decade? What has genuinely improved?",
      "Describe the qualities of the friendships you most deeply crave but feel you don't yet have in your life.",
      "What do you most need from the people in your life right now — and have you actually, clearly communicated this?",
    ],
    courageous:[
      "Who in your life drains your energy most consistently? What role do you play in allowing that dynamic to continue?",
      "What unsaid truth, specific gratitude or long-overdue apology are you carrying that deserves to be expressed?",
      "In your most important relationship, where have you been showing up as less than your full self? What holds you back?",
      "What kind of love are you still waiting to receive from others — and what if you offered it to yourself first?",
      "Name one relationship you have genuinely outgrown but haven't yet had the courage to honestly acknowledge.",
    ],
    tender:[
      "Write about someone who believed in you before you believed in yourself. What did their quiet faith mean to you?",
      "Who in your life deserves to hear 'thank you' in a deeper, more specific way than you have ever expressed?",
      "What does true intimacy — emotional, not just physical — mean to you at this particular stage of your life?",
      "Where in your relationships do you most need to practice forgiveness — of others, and of yourself?",
      "Describe the feeling of being truly seen and fully known by another person. When did you last experience that?",
    ]
  },
  burnout:{
    label:"🔥 Burnout",title:"Rest & Recovery",
    subtitle:"Honest reflections on exhaustion, depletion and reclaiming your energy and aliveness.",
    icon:"🔥",

let curCat='identity', curDepth='reflective', curTheme='fire', wsN=1;

function setCat(el){
  document.querySelectorAll('.cp').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  curCat=el.dataset.cat;
  generate();
}
function setDepth(el){
  document.querySelectorAll('.dp').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  curDepth=el.dataset.d;
  generate();
}
function setTheme(el){
  document.querySelectorAll('.tp').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  curTheme=el.dataset.t;
  document.body.setAttribute('data-theme',curTheme);
}
function shuffle(a){let b=a.slice();for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function generate(){
  const cat=CATS[curCat];
  const prompts=shuffle(cat[curDepth]).slice(0,5);
  const ws=document.getElementById('worksheet');
  const depthLabel=curDepth.charAt(0).toUpperCase()+curDepth.slice(1);
  ws.innerHTML=`
    <div class="ws-stripe"></div>
    <div class="ws-topbar">
      <div class="ws-eyebrow" contenteditable="true" spellcheck="false">Midlife Self-Discovery · 314 Prompts</div>
      <div class="ws-topbar-right"><div class="ws-dot"></div><div class="ws-dot"></div><div class="ws-dot"></div></div>
    </div>
    <div class="ws-header">
      <div class="ws-header-l">
        <div class="ws-cat-pill">${cat.icon} ${cat.label} · ${depthLabel}</div>
        <div class="ws-title" contenteditable="true" spellcheck="false">${cat.title}</div>
        <div class="ws-subtitle" contenteditable="true" spellcheck="false">${cat.subtitle}</div>
      </div>
      <div class="ws-header-r">
        <div class="info-row"><span contenteditable="true" spellcheck="false">Name</span><div class="info-line"></div></div>

        <div class="info-row"><span contenteditable="true" spellcheck="false">Session</span><div class="info-line"></div></div>
      </div>
    </div>
    <div class="ws-body">

        <div class="insight-lbl" contenteditable="true" spellcheck="false">My Key Insight Today</div>

          <div class="insight-line"></div>
          <div class="insight-line"></div>
        </div>

    <div class="ws-footer">
      <div class="ws-footer-l">From <strong>314 Prompts for Profound Midlife Self-Help Books</strong> · Bonus Worksheet #${wsN}</div>
      <div class="ws-num">${wsN}</div>
    </div>
  `;
  wsN++;
}

function saveAsPNG(){
  const ws=document.getElementById('worksheet');
  const ed=ws.querySelectorAll('[contenteditable="true"]');
  ed.forEach(el=>el.style.border='none');
  htmlToImage.toPng(ws,{pixelRatio:2,backgroundColor:'#fff'})
    .then(function(dataUrl){
      let a=document.createElement('a');
      a.download=`Midlife_Worksheet_${curCat}_${curDepth}_${wsN-1}.png`;
      a.href=dataUrl;a.click();
      ed.forEach(el=>el.style.border='');
    })
    .catch(function(){ed.forEach(el=>el.style.border='');alert('Try using Print instead.')});
}
